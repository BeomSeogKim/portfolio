<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="580" fill="#ffffff"/>

  <!-- ===== BEFORE PANEL ===== -->
  <rect x="20" y="16" width="760" height="210" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>

  <!-- BEFORE title -->
  <text x="40" y="44" font-size="15" font-weight="bold" fill="#DC2626">BEFORE</text>
  <text x="105" y="44" font-size="13" fill="#7F1D1D">Legacy Test Architecture</text>

  <!-- Box 1: Selenium + Python -->
  <rect x="45" y="62" width="200" height="72" rx="8" fill="#ffffff" stroke="#F87171" stroke-width="1.5"/>
  <text x="145" y="84" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">Selenium + Python</text>
  <text x="145" y="100" font-size="11" fill="#6B7280" text-anchor="middle">38 tests</text>
  <text x="145" y="114" font-size="11" fill="#6B7280" text-anchor="middle">100+ XPath</text>
  <text x="145" y="128" font-size="10" fill="#9CA3AF" text-anchor="middle">function.py</text>

  <!-- Box 2: Playwright + TS -->
  <rect x="300" y="62" width="200" height="72" rx="8" fill="#ffffff" stroke="#F87171" stroke-width="1.5"/>
  <text x="400" y="84" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">Playwright + TS</text>
  <text x="400" y="100" font-size="11" fill="#6B7280" text-anchor="middle">2 tests</text>
  <text x="400" y="118" font-size="10" fill="#9CA3AF" text-anchor="middle">빈 fixtures</text>

  <!-- Box 3: AI Tests + Python -->
  <rect x="555" y="62" width="200" height="72" rx="8" fill="#ffffff" stroke="#F87171" stroke-width="1.5"/>
  <text x="655" y="84" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">AI Tests + Python</text>
  <text x="655" y="100" font-size="11" fill="#6B7280" text-anchor="middle">18 tests</text>
  <text x="655" y="114" font-size="11" fill="#6B7280" text-anchor="middle">수동 dispatch</text>
  <text x="655" y="128" font-size="10" fill="#9CA3AF" text-anchor="middle">Claude API 직접</text>

  <!-- Vertical lines from boxes -->
  <line x1="145" y1="134" x2="145" y2="156" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="134" x2="400" y2="156" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="655" y1="134" x2="655" y2="156" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Horizontal line connecting the three dashed lines -->
  <line x1="145" y1="156" x2="655" y2="156" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- "No sync" label -->
  <text x="400" y="174" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="bold">독립 셀렉터 관리, 동기화 없음</text>

  <!-- CI / Monitor info -->
  <text x="45" y="200" font-size="11" fill="#7F1D1D">CI: 11 workflows (10 manual, 1 cron)</text>
  <text x="45" y="216" font-size="11" fill="#7F1D1D">Monitor: 단순 Slack 알림</text>

  <!-- ===== TRANSITION ARROW ===== -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6B7280">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>
  <line x1="400" y1="232" x2="400" y2="264" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="320" y="237" width="160" height="22" rx="11" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="400" y="252" font-size="12" font-weight="bold" fill="#4B5563" text-anchor="middle">→ 전면 재설계</text>

  <!-- ===== AFTER PANEL ===== -->
  <rect x="20" y="272" width="760" height="292" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>

  <!-- AFTER title -->
  <text x="40" y="300" font-size="15" font-weight="bold" fill="#1D4ED8">AFTER</text>
  <text x="97" y="300" font-size="13" fill="#1E3A5F">Self-Healing Architecture</text>

  <!-- Central registry box -->
  <rect x="260" y="312" width="280" height="72" rx="8" fill="#ffffff" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="333" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">selector-registry.json</text>
  <text x="400" y="349" font-size="11" fill="#6B7280" text-anchor="middle">135 selectors</text>
  <text x="400" y="363" font-size="11" fill="#6B7280" text-anchor="middle">primary + fallbacks + source (React path)</text>
  <text x="400" y="375" font-size="10" fill="#3B82F6" text-anchor="middle" font-weight="bold">Single Source of Truth</text>

  <!-- Vertical line from registry down -->
  <line x1="400" y1="384" x2="400" y2="410" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Horizontal distribution line -->
  <line x1="140" y1="410" x2="660" y2="410" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Vertical lines to child boxes -->
  <line x1="140" y1="410" x2="140" y2="430" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="400" y1="410" x2="400" y2="430" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="660" y1="410" x2="660" y2="430" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Arrowheads on vertical lines -->
  <polygon points="136,428 140,436 144,428" fill="#3B82F6"/>
  <polygon points="396,428 400,436 404,428" fill="#3B82F6"/>
  <polygon points="656,428 660,436 664,428" fill="#3B82F6"/>

  <!-- Box: Pre-Heal (n8n) - green for AI -->
  <rect x="50" y="436" width="180" height="72" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <text x="140" y="458" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">Pre-Heal</text>
  <text x="140" y="474" font-size="11" fill="#6B7280" text-anchor="middle">(n8n)</text>
  <text x="140" y="498" font-size="11" fill="#059669" text-anchor="middle" font-weight="bold">선제 복구</text>

  <!-- Box: Playwright tests -->
  <rect x="305" y="436" width="190" height="72" rx="8" fill="#ffffff" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="458" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">Playwright</text>
  <text x="400" y="474" font-size="11" fill="#6B7280" text-anchor="middle">25 specs / 79 tests</text>
  <text x="400" y="498" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="bold">통합 테스트</text>

  <!-- Box: Runtime Heal - green for AI -->
  <rect x="570" y="436" width="180" height="72" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <text x="660" y="458" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">Runtime Heal</text>
  <text x="660" y="474" font-size="11" fill="#6B7280" text-anchor="middle">(Bedrock Haiku)</text>
  <text x="660" y="498" font-size="11" fill="#059669" text-anchor="middle" font-weight="bold">실시간 복구</text>

  <!-- CI / Monitor / n8n info -->
  <text x="45" y="532" font-size="11" fill="#1E3A5F">CI: 3-Tier (Smoke hourly + Full 4x/day + Deploy)</text>
  <text x="45" y="548" font-size="11" fill="#1E3A5F">Monitor: 4-Stage Escalation (HEALTHY → ALERT → INCIDENT → CRITICAL)</text>
  <text x="45" y="564" font-size="11" fill="#1E3A5F">n8n: 8 workflows on EKS</text>
</svg>